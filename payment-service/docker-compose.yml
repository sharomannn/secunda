version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:16
    container_name: payment-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: payment-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP порт
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI приложение
  api:
    build: .
    container_name: payment-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: change-me-in-production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # RabbitMQ Consumer для обработки платежей
  consumer:
    build: .
    container_name: payment-consumer
    command: python -m app.consumer.payment_handler
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # Outbox Publisher для публикации событий
  outbox-publisher:
    build: .
    container_name: payment-outbox-publisher
    command: python -m app.tasks.outbox_publisher
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      OUTBOX_PUBLISH_INTERVAL: 5
      OUTBOX_BATCH_SIZE: 100
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

# Volumes для персистентности данных
volumes:
  postgres_data:
  rabbitmq_data:
